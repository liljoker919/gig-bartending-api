services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gigbartending-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQLSERVER_SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - gigbartending-network
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  gigbartending-network:
    driver: bridge