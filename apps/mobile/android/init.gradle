allprojects {
    pluginManager.withPlugin("com.facebook.react") {
        // Use the string name to avoid 'unknown property com' during evaluation
        def reactExtension = project.extensions.findByName("react")
        if (reactExtension != null) {
            reactExtension.reactNativeDir = file("../../../node_modules/react-native")
            reactExtension.codegenDir = file("../../../node_modules/@react-native/codegen")
        }
    }
}
